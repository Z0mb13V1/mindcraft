# Prometheus configuration for NAS/local monitoring
# Scrapes Docker containers and node metrics

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080'] # Docker metrics exporter (cadvisor)

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100'] # Node exporter for NAS

# Add more targets for cloud nodes as needed
