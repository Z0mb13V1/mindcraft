# =============================================================================
# LiteLLM Proxy Configuration
# =============================================================================
# Unified gateway for all LLM providers used by Mindcraft.
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# Usage:
#   docker compose up litellm          (local)
#   docker compose -f docker-compose.aws.yml up litellm  (AWS)
# =============================================================================

model_list:
  # ── Google Gemini ──────────────────────────────────────────────────────────
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-embedding-001
    litellm_params:
      model: gemini/gemini-embedding-001
      api_key: os.environ/GEMINI_API_KEY

  # ── xAI / Grok ────────────────────────────────────────────────────────────
  - model_name: grok-4-1-fast-non-reasoning
    litellm_params:
      model: xai/grok-4-1-fast-non-reasoning
      api_key: os.environ/XAI_API_KEY

  - model_name: grok-code-fast-1
    litellm_params:
      model: xai/grok-code-fast-1
      api_key: os.environ/XAI_API_KEY

  # ── Anthropic / Claude ─────────────────────────────────────────────────────
  - model_name: claude-sonnet-4
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── vLLM (local 3090 GPU via Tailscale) ────────────────────────────────────
  # Set VLLM_BASE_URL in .env to your Tailscale IP, e.g.:
  #   VLLM_BASE_URL=http://100.x.y.z:8000/v1
  - model_name: qwen-2.5-7b
    litellm_params:
      model: openai/Qwen/Qwen2.5-7B-Instruct
      api_base: os.environ/VLLM_BASE_URL

  - model_name: gemma-3-12b
    litellm_params:
      model: openai/google/gemma-3-12b-it
      api_base: os.environ/VLLM_BASE_URL

# ── General Settings ─────────────────────────────────────────────────────────
litellm_settings:
  drop_params: true          # Silently drop unsupported params per provider
  set_verbose: false
  num_retries: 2
  request_timeout: 60
  fallbacks:
    - gemini-2.5-pro: [gemini-2.5-flash]
    - grok-4-1-fast-non-reasoning: [gemini-2.5-flash]
    - qwen-2.5-7b: [gemini-2.5-flash]
    - gemma-3-12b: [gemini-2.5-flash]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
