apiVersion: 1

# Grafana Unified Alerting — Mindcraft monitoring rules
# Fires alerts visible in Grafana UI (Alerting → Alert rules).
# To get notifications add a contact point in Grafana UI:
#   Alerting → Contact points → Add (Discord webhook, email, etc.)

groups:
  # ── GPU Health ─────────────────────────────────────────────────────────────
  - orgId: 1
    name: GPU Health
    folder: Mindcraft
    interval: 1m
    rules:

      - uid: gpu-temp-critical
        title: "GPU Temperature Critical (>85°C)"
        condition: B
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: nvidia_smi_temperature_gpu
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 85
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "GPU temperature is {{ $values.A.Value }}°C — above 85°C threshold"
          description: "Reduce GPU workload or improve airflow/cooling immediately."
        labels:
          severity: critical

      - uid: gpu-utilization-high
        title: "GPU Utilization Sustained High (>95%)"
        condition: B
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: nvidia_smi_utilization_gpu_ratio * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            queryType: ''
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 95
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: "GPU utilization {{ $values.A.Value }}% — sustained above 95% for 10 min"
          description: "GPU is saturated. Check for runaway vLLM inference or game load."
        labels:
          severity: warning

      - uid: gpu-vram-high
        title: "GPU VRAM Usage High (>90%)"
        condition: B
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: nvidia_smi_memory_used_bytes / nvidia_smi_memory_total_bytes * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 90
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "VRAM usage is {{ $values.A.Value }}% — above 90% threshold"
          description: "GPU memory pressure may cause OOM errors. Reduce model size or batch size."
        labels:
          severity: warning

  # ── Exporter Health ─────────────────────────────────────────────────────────
  - orgId: 1
    name: Exporter Health
    folder: Mindcraft
    interval: 1m
    rules:

      - uid: gpu-exporter-down
        title: "nvidia-gpu-exporter Down"
        condition: B
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: up{job="nvidia-gpu"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "nvidia-gpu-exporter is not reachable by Prometheus"
          description: "GPU metrics unavailable. Check nvidia-gpu-exporter container status."
        labels:
          severity: critical

  # ── Mindcraft Agent Health ───────────────────────────────────────────────────
  - orgId: 1
    name: Mindcraft Agents
    folder: Mindcraft
    interval: 1m
    rules:

      - uid: mindcraft-container-down
        title: "Mindcraft Agent Container Down"
        condition: B
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: absent(container_last_seen{container_label_com_docker_compose_service="mindcraft"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "Mindcraft agent container has disappeared"
          description: "The mindcraft-agents container is not running. Restart with: docker compose up mindcraft"
        labels:
          severity: critical
