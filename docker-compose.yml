services:
  nvidia-gpu-exporter:
    image: nvidia-gpu-exporter
    container_name: nvidia-gpu-exporter
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9835:9835"
    restart: unless-stopped
  minecraft:
    image: itzg/minecraft-server
    container_name: minecraft-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      MEMORY: "4G"
      VERSION: "1.21.6"
      DIFFICULTY: "normal"
      MODE: "survival"
      ENABLE_COMMAND_BLOCK: "true"
      VIEW_DISTANCE: "10"
    volumes:
      - ./minecraft-data:/data
    restart: unless-stopped
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "mc-health", "--host", "localhost", "--port", "25565"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mindcraft:
    build: .
    container_name: mindcraft-agents
    environment:
      SETTINGS_JSON: '{"auto_open_ui": false, "mindserver_host_public": true}'
    volumes:
      - ./settings.js:/app/settings.js
      - ./keys.json:/app/keys.json
      - ./profiles:/app/profiles
      - ./bots:/app/bots
    ports:
      - "3000-3003:3000-3003" # see the view from the camera mounted on your bot head: http://localhost:3000/
      - "8080:8080" # MindServer UI: http://localhost:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minecraft:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  discord-bot:
    image: node:22
    container_name: discord-bot
    working_dir: /app
    volumes:
      - ./discord-bot.js:/app/discord-bot.js
      - ./package.json:/app/package.json
      - ./src:/app/src
      - ./profiles:/app/profiles
    environment:
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      BOT_DM_CHANNEL: "${BOT_DM_CHANNEL}"
      BACKUP_CHAT_CHANNEL: "${BACKUP_CHAT_CHANNEL}"
      DISCORD_ADMIN_IDS: "${DISCORD_ADMIN_IDS}"
      MINDSERVER_HOST: "${MINDSERVER_HOST:-mindcraft-agents}"

  # ── vLLM (deferred — using WSL2 instead, see setup-wsl-vllm.ps1) ────────────
  # Start vLLM:  wsl -d Ubuntu-22.04 -- bash services/vllm/start.sh --background
  # Endpoint:    http://host.docker.internal:8000/v1  (used by all bot profiles)
  # Uncomment below only if you want to run vLLM in Docker instead of WSL2.
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: vllm-server
  #   ports:
  #     - "8000:8000"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   command: >
  #     --model google/gemma-3-12b-it
  #     --max-model-len 4096
  #     --gpu-memory-utilization 0.90
  #     --enforce-eager
  #     --dtype half
  #   restart: unless-stopped
  #   profiles:
  #     - vllm

  viaproxy: #use this service to connect to an unsupported minecraft server versions. more info: ./services/viaproxy/README.md
    image: ghcr.io/viaversion/viaproxy:latest
    volumes:
      - ./services/viaproxy:/app/run
    ports:
      - "25568:25568"
    stdin_open: true
    tty: true

  # ── LiteLLM — Unified LLM proxy ──────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    environment:
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      XAI_API_KEY: "${XAI_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      VLLM_BASE_URL: "${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-litellm-dev}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: --config /app/config.yaml
    restart: unless-stopped

volumes:
  vllm-models:
