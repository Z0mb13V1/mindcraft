  #   command: >
  #     --model google/gemma-3-12b-it
  #     --max-model-len 4096
  #     --gpu-memory-utilization 0.90
  #     --enforce-eager
  #     --dtype half
  #   restart: unless-stopped
  #   profiles:
  #     - vllm

volumes:
  vllm-models:
