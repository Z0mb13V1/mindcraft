# Prometheus configuration for AWS EC2 deployment
# No nvidia-gpu scrape job (no GPU on EC2)

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']  # Docker container metrics

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']  # EC2 host metrics
