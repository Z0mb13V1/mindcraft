# CI/CD Pipeline for Mindcraft 0.1.3
# Validates Node.js install + Docker build on every push/PR to main

name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libcairo2-dev libpango1.0-dev \
            libjpeg-dev libgif-dev librsvg2-dev \
            libgl1-mesa-dev libxi-dev python3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint (non-blocking)
        run: npx eslint . --max-warnings 999 || true
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t ghcr.io/z0mb13v1/mindcraft-0.1.3:${{ github.sha }} .

      - name: Tag Docker image as latest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: docker tag ghcr.io/z0mb13v1/mindcraft-0.1.3:${{ github.sha }} ghcr.io/z0mb13v1/mindcraft-0.1.3:latest

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push ghcr.io/z0mb13v1/mindcraft-0.1.3:${{ github.sha }}
          docker push ghcr.io/z0mb13v1/mindcraft-0.1.3:latest
